{% extends "base.html" %}

{% block title %}Login - TweetArchive Pro{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center relative overflow-hidden">
    <!-- Main Form Container -->
    <div class="bg-x-black border border-x-border sm:rounded-2xl w-full sm:w-[600px] h-screen sm:h-auto flex flex-col p-8 sm:p-12 relative z-10 mx-auto">
        
        <div class="flex justify-center mb-8">
            <!-- Icon placeholder for Logo -->
            <ion-icon name="bookmark" class="text-x-text text-5xl"></ion-icon>
        </div>

        <h1 class="text-3xl font-bold mb-10 text-center" id="form-title">Log in to Archive</h1>

        <form id="auth-form" class="flex flex-col gap-6 w-full max-w-[380px] mx-auto">
            <!-- Username Input -->
            <div class="relative group">
                <input type="text" id="username" name="username" required autocomplete="username"
                       class="w-full bg-transparent border border-x-border rounded pt-6 pb-2 px-3 text-lg focus:border-x-blue peer focus:outline-none"
                       placeholder=" ">
                <label for="username" class="absolute left-3 top-2 text-x-text-muted text-sm transition-all peer-placeholder-shown:top-4 peer-placeholder-shown:text-base peer-focus:top-2 peer-focus:text-sm peer-focus:text-x-blue">Username</label>
            </div>
            
            <!-- Password Input -->
            <div class="relative group">
                <input type="password" id="password" name="password" required autocomplete="current-password"
                       class="w-full bg-transparent border border-x-border rounded pt-6 pb-2 px-3 text-lg focus:border-x-blue peer focus:outline-none"
                       placeholder=" ">
                <label for="password" class="absolute left-3 top-2 text-x-text-muted text-sm transition-all peer-placeholder-shown:top-4 peer-placeholder-shown:text-base peer-focus:top-2 peer-focus:text-sm peer-focus:text-x-blue">Password</label>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="submit-btn" class="w-full bg-x-text text-x-black font-bold py-3.5 rounded-full hover:bg-gray-200 mt-6 text-base tracking-wide">
                Log in
            </button>
            
            <p class="text-center text-x-text-muted mt-8 mb-2">
                <span id="toggle-text">Don't have an account?</span>
                <button type="button" id="toggle-mode-btn" class="text-x-blue hover:underline font-medium ml-1">Sign up</button>
            </p>
        </form>
    </div>
</div>

<script>
    let isLogin = true;
    const lang = localStorage.getItem('appSettings') ? JSON.parse(localStorage.getItem('appSettings')).lang : 'en';
    const form = document.getElementById('auth-form');
    const title = document.getElementById('form-title');
    const submitBtn = document.getElementById('submit-btn');
    const toggleBtn = document.getElementById('toggle-mode-btn');
    const toggleText = document.getElementById('toggle-text');

    toggleBtn.addEventListener('click', () => {
        isLogin = !isLogin;
        title.innerText = isLogin ? 'Log in to Archive' : 'Create an Account';
        submitBtn.innerText = isLogin ? 'Log in' : 'Create Account';
        toggleText.innerText = isLogin ? "Don't have an account?" : "Already have an account?";
        toggleBtn.innerText = isLogin ? 'Sign up' : 'Log in';
    });

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        submitBtn.disabled = true;
        submitBtn.innerText = '...';

        try {
            if (isLogin) {
                // Login
                const formData = new FormData();
                formData.append('username', username);
                formData.append('password', password);
                const res = await fetch('/token', { method: 'POST', body: formData });
                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('token', data.access_token);
                    window.location.href = '/';
                } else {
                    if (window.showToast) showToast(lang === 'ja' ? 'ログインに失敗しました。' : 'Invalid credentials', 'error');
                    else alert('Invalid credentials');
                }
            } else {
                // Register
                const res = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                if (res.ok) {
                    if (window.showToast) showToast(lang === 'ja' ? 'アカウントを作成しました！ログインしてください。' : 'Account created! Please log in.', 'success');
                    else alert('Account created!');
                    isLogin = true;
                    if (toggleBtn) toggleBtn.click();
                } else {
                    const err = await res.json();
                    if (window.showToast) showToast(err.detail || 'Registration failed', 'error');
                    else alert(err.detail || 'Registration failed');
                }
            }
        } catch (err) {
            console.error(err);
            if (window.showToast) showToast('An error occurred', 'error');
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = isLogin ? (lang === 'ja' ? 'ログイン' : 'Log in') : (lang === 'ja' ? 'アカウント作成' : 'Create Account');
        }
    });

    // Language handling
    if (lang === 'ja') {
        title.innerText = isLogin ? 'アーカイブにログイン' : 'アカウントを作成';
        submitBtn.innerText = isLogin ? 'ログイン' : '登録する';
        toggleText.innerText = isLogin ? "アカウントをお持ちでないですか？" : "既にアカウントをお持ちですか？";
        toggleBtn.innerText = isLogin ? '新規登録' : 'ログイン';
    }
</script>

<!-- Add Toast implementation if app.js is not loaded yet (for login page) -->
<div id="toast-container" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-3"></div>
<script>
function showToast(message, type = 'success') {
    const container = document.getElementById('toast-container');
    if (!container) return;
    const toast = document.createElement('div');
    const bgColor = type === 'error' ? 'bg-red-500' : 'bg-x-blue';
    toast.className = `${bgColor} text-white px-6 py-3 rounded-full shadow-lg font-medium text-sm flex items-center gap-2 toast-enter z-[100] transition-all duration-300 transform`;
    toast.innerHTML = `<ion-icon name="${type === 'error' ? 'alert-circle' : 'checkmark-circle'}" class="text-xl"></ion-icon> ${message}`;
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(20px)';
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}
</script>
{% endblock %}
