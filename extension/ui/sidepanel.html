<!DOCTYPE html>
<html style="height: 100%;">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="common.css">
    <style>body { width: 100%; height: 100%; }</style>
</head>
<body style="height: 100%;">
    <div id="auth-section" class="auth-container hidden">
        <h2 style="margin: 0; font-size: 18px;">Login to TweetArchive</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button id="login-btn" class="btn-primary">Login</button>
    </div>
    <div id="save-section" class="save-container hidden" style="height: 100%;">
        <div id="tweet-preview" class="preview-card">
            <div id="author-preview" class="preview-author">Loading...</div>
            <div id="text-preview" style="color: var(--x-text-muted);">Fetching...</div>
        </div>
        <select id="save-category"><option value="未分類">未分類</option></select>
        <input type="text" id="save-tags" placeholder="tags...">
        <textarea id="save-note" style="flex: 1;" placeholder="Memo..."></textarea>
        <button id="save-btn" class="btn-primary">Archive Tweet</button>
    </div>
    <div id="toast" class="toast hidden">Saved!</div>
    <script src="api.js"></script>
    <script src="popup.js"></script>
</body>
</html>
